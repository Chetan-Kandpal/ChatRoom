<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-container">

    <h2>Login</h2>

    <form id="loginForm">

        <div class="form-group">
            <input
                type="text"
                id="username"
                placeholder="Username"
                required>
        </div>

        <div class="form-group">
            <input
                type="password"
                id="password"
                placeholder="Password"
                required>
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="auth-links">
        <a href="/register.html">
            Create Account
        </a>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
